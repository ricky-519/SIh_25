version: '3.8'
services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    networks:
      - ocean-intel-net

  auth-service:
    build: ./services/auth-service
    ports:
      - "5001:5001"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - ocean-intel-net

  alert-service:
    build: ./services/alert-service
    ports:
      - "5002:5002"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - ocean-intel-net

  map-service:
    build: ./services/map-service
    ports:
      - "5003:5003"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - ocean-intel-net

networks:
  ocean-intel-net:
    driver: bridge
